version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: ./production/Dockerfile.production
    container_name: publications-app-production
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/publications.db
      - SECRET_KEY=f8e9a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-production
    volumes:
      - ./production/reverse-proxy-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./production/certs:/etc/ssl/certs:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
